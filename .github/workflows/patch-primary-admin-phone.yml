name: Patch Primary Admin Phone

on:
  push:
    paths:
      - '.github/workflows/patch-primary-admin-phone.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch phone login mapping and version
        run: |
          python - <<'PY'
          from pathlib import Path

          phone_file = Path('app/src/main/java/com/ahmed/yawmeyaty/EcoWastePhoneActivity.kt')
          text = phone_file.read_text(encoding='utf-8')
          old = 'val loginEmail = "$phone@ecowaste.local"'
          new = 'val loginEmail = if (phone == "01208097044") "ahmedbahrawy814@gmail.com" else "$phone@ecowaste.local"'
          if old not in text:
              raise SystemExit('Expected login mapping not found')
          phone_file.write_text(text.replace(old, new, 1), encoding='utf-8')

          gradle = Path('app/build.gradle.kts')
          g = gradle.read_text(encoding='utf-8')
          g = g.replace('versionCode = 10', 'versionCode = 11', 1)
          g = g.replace('versionName = "4.2.0"', 'versionName = "4.2.1"', 1)
          gradle.write_text(g, encoding='utf-8')

          workflow = Path('.github/workflows/build-apk.yml')
          w = workflow.read_text(encoding='utf-8')
          w = w.replace('Eco-Waste-v4.2.0-Admin-Users.apk', 'Eco-Waste-v4.2.1-Primary-Admin-Phone.apk')
          workflow.write_text(w, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/ahmed/yawmeyaty/EcoWastePhoneActivity.kt app/build.gradle.kts .github/workflows/build-apk.yml
          git commit -m "Use 01208097044 as the primary admin login"
          git push origin main
