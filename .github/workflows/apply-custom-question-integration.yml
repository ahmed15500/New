name: Apply Custom Question Integration

on:
  push:
    branches: [ agent/custom-question-packs-v3.1 ]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/custom-question-packs-v3.1

      - name: Integrate custom question manager
