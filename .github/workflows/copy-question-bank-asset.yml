name: Bundle Question Bank Asset

on:
  push:
    branches: [ agent/remote-question-updates-v3.2 ]

permissions:
  contents: write

jobs:
  bundle:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remote-question-updates-v3.2
      - name: Copy online bank into Android assets
        run: |
          mkdir -p app/src/main/assets
          cp question-bank/questions.json app/src/main/assets/questions.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/assets/questions.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Bundle offline fallback question bank"
          git push origin HEAD:agent/remote-question-updates-v3.2
