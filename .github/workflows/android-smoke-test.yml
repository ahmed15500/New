name: Android Launch Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  launch-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build and launch on Android 10
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_2
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            chmod +x gradlew
            ./gradlew --no-daemon assembleDebug
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb logcat -c
            adb shell am start -W -n com.ahmed.yawmeyaty/.MainActivity
            sleep 8
            adb logcat -d > app-launch-logcat.txt
            adb exec-out screencap -p > app-launch.png
            PID=$(adb shell pidof com.ahmed.yawmeyaty 2>/dev/null | tr -d '\r' || true)
            echo "Application PID: $PID"
            if [ -z "$PID" ]; then
              echo "Application process stopped after launch."
              grep -A120 -B30 -E "FATAL EXCEPTION|AndroidRuntime|Process: com.ahmed.yawmeyaty" app-launch-logcat.txt || true
              exit 1
            fi
            adb shell dumpsys activity activities | grep -E "mResumedActivity|topResumedActivity" || true

      - name: Upload launch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-launch-evidence
          path: |
            app-launch-logcat.txt
            app-launch.png
          if-no-files-found: warn
          retention-days: 7
