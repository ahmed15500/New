name: Android Launch Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  launch-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build and launch both activities on Android 10
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_2
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            chmod +x gradlew
            ./gradlew --no-daemon assembleDebug
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb logcat -c

            adb shell am start -W -n com.ahmed.yawmeyaty/.MainActivity | tee main-activity-start.txt
            sleep 6
            adb exec-out screencap -p > midani-main.png

            adb shell am start -W -n com.ahmed.yawmeyaty/.ListenSaverActivity | tee listen-saver-start.txt
            sleep 6
            adb exec-out screencap -p > listen-saver.png
            adb logcat -d > app-launch-logcat.txt

            if ! grep -q "Status: ok" main-activity-start.txt; then
              echo "MainActivity did not start successfully."
              exit 1
            fi

            if ! grep -q "Status: ok" listen-saver-start.txt; then
              echo "ListenSaverActivity did not start successfully."
              exit 1
            fi

            if grep -q "FATAL EXCEPTION" app-launch-logcat.txt; then
              echo "A fatal application crash was detected."
              grep -A120 -B30 -E "FATAL EXCEPTION|AndroidRuntime|Process: com.ahmed.yawmeyaty" app-launch-logcat.txt || true
              exit 1
            fi

            echo "MainActivity and ListenSaverActivity opened without a fatal crash."

      - name: Upload launch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-launch-evidence
          path: |
            app-launch-logcat.txt
            main-activity-start.txt
            listen-saver-start.txt
            midani-main.png
            listen-saver.png
          if-no-files-found: warn
          retention-days: 7
