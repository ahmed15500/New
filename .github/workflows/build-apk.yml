name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew --no-daemon --stacktrace assembleDebug 2>&1 | tee build-log.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Islamic-Quiz-Build-Log
          path: build-log.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Rename APK
        if: success()
        run: cp app/build/outputs/apk/debug/app-debug.apk Islamic-Quiz-v3.0.0-debug.apk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Islamic-Quiz-APK
          path: Islamic-Quiz-v3.0.0-debug.apk
          if-no-files-found: error
          retention-days: 30
