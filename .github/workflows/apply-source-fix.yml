name: Apply Midani Source Fix

on:
  push:
    branches: [ agent/midani-v2 ]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/midani-v2

      - name: Remove invalid Compose import
        run: |
          sed -i '/import androidx.compose.foundation.layout.weight/d' app/src/main/java/com/ahmed/yawmeyaty/MainActivity.kt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/ahmed/yawmeyaty/MainActivity.kt
          if git diff --cached --quiet; then
            echo "No source fix required."
            exit 0
          fi
          git commit -m "Fix Compose RowScope weight import"
          git push origin HEAD:agent/midani-v2
